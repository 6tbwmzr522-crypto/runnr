<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Runnr — Sign in</title>
<style>
  :root {
    --bg: #080c12;
    --surface: #0c1118;
    --text: #f5f2ec;
    --text2: rgba(245, 242, 236, 0.65);
    --accent: #00e5a0;
    --red: #ff4d6d;
    --border: rgba(201, 169, 110, 0.2);
    --gold: #C9A96E;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 16px;
  }
  .wrap {
    max-width: 400px;
    margin: 0 auto;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
  }
  h1 {
    font-size: 28px;
    font-weight: 300;
    font-style: italic;
    color: var(--accent);
    margin: 0 0 8px;
  }
  .sub { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.45; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 16px;
  }
  label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  input {
    width: 100%;
    padding: 14px 12px;
    margin-bottom: 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #101620;
    color: var(--text);
    font-size: 16px;
    -webkit-appearance: none;
  }
  button, .link-btn {
    display: block;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
    text-align: center;
    text-decoration: none;
  }
  #signin-btn { background: var(--accent); color: #080c12; margin-top: 4px; }
  #reset-btn { background: transparent; color: var(--gold); border: 1px solid var(--border); margin-top: 10px; }
  .back { color: var(--text2); font-size: 14px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
  #status {
    min-height: 20px;
    font-size: 14px;
    line-height: 1.4;
    margin: 12px 0 4px;
  }
  #status.err { color: var(--red); }
  #status.ok { color: var(--accent); }
  #status.work { color: var(--gold); }
  .hint { font-size: 12px; color: var(--text2); margin-top: 16px; line-height: 1.4; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">← Back to Runnr</a>
  <h1>runnr</h1>
  <p class="sub">Simple sign-in for iPhone. Use the same email and password as on your Mac.</p>

  <div class="card">
    <label for="email">Email</label>
    <input id="email" type="email" inputmode="email" autocomplete="username" autocapitalize="none" autocorrect="off" placeholder="you@example.com">

    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" autocapitalize="none" autocorrect="off" placeholder="Your password">

    <label for="password2" id="confirm-label" style="display:none">Confirm new password</label>
    <input id="password2" type="password" autocomplete="new-password" autocapitalize="none" autocorrect="off" placeholder="Type again" style="display:none">

    <div id="status"></div>
    <button type="button" id="signin-btn">Sign in</button>
    <button type="button" id="reset-btn">Forgot password? Set new one</button>
  </div>

  <p class="hint">Not in Private Browsing — Safari blocks saving your login there. After sign-in you’ll return to the app automatically.</p>
</div>
<script>
(function () {
  const API = "https://api.runnr.fyi";
  const emailEl = document.getElementById("email");
  const passEl = document.getElementById("password");
  const pass2El = document.getElementById("password2");
  const confirmLabel = document.getElementById("confirm-label");
  const statusEl = document.getElementById("status");
  const signinBtn = document.getElementById("signin-btn");
  const resetBtn = document.getElementById("reset-btn");
  let resetMode = false;

  try {
    const remembered = localStorage.getItem("runnr_remember_email");
    if (remembered) emailEl.value = remembered;
  } catch (e) {}

  function setStatus(text, kind) {
    statusEl.textContent = text || "";
    statusEl.className = kind || "";
  }

  function storageOk() {
    try {
      const k = "__runnr_test__";
      localStorage.setItem(k, "1");
      localStorage.removeItem(k);
      return true;
    } catch (e) {
      return false;
    }
  }

  function saveSession(token, email) {
    localStorage.setItem("runnr_api_token", token);
    localStorage.setItem("runnr_api_email", email);
    localStorage.setItem("runnr_remember_email", email);
    localStorage.setItem("runnr_api_url", API);
  }

  function goHome() {
    setStatus("Signed in — opening Runnr…", "ok");
    setTimeout(function () {
      window.location.href = "/?signedin=1";
    }, 400);
  }

  async function apiPost(path, body) {
    const ctrl = new AbortController();
    const timer = setTimeout(function () { ctrl.abort(); }, 15000);
    try {
      const res = await fetch(API + path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
        signal: ctrl.signal,
      });
      let data = {};
      try { data = await res.json(); } catch (e) {}
      if (!res.ok) {
        const detail = data.detail;
        const msg = typeof detail === "string" ? detail : JSON.stringify(detail || "Request failed");
        throw new Error(msg);
      }
      return data;
    } finally {
      clearTimeout(timer);
    }
  }

  function readFields() {
    return {
      email: (emailEl.value || "").trim().toLowerCase(),
      password: (passEl.value || "").trim(),
      confirm: (pass2El.value || "").trim(),
    };
  }

  function validate(email, password) {
    if (!email) return "Enter your email.";
    if (!email.includes("@")) return "Enter a valid email.";
    if (!password) return "Enter your password.";
    if (password.length < 8) return "Password must be at least 8 characters.";
    return "";
  }

  signinBtn.addEventListener("click", function () {
    if (resetMode) return doReset();
    return doSignIn();
  });

  resetBtn.addEventListener("click", function () {
    resetMode = !resetMode;
    const show = resetMode;
    pass2El.style.display = show ? "block" : "none";
    confirmLabel.style.display = show ? "block" : "none";
    passEl.autocomplete = show ? "new-password" : "current-password";
    document.querySelector('label[for="password"]').textContent = show ? "New password" : "Password";
    signinBtn.textContent = show ? "Set new password & sign in" : "Sign in";
    resetBtn.textContent = show ? "← Back to sign in" : "Forgot password? Set new one";
    setStatus("", "");
  });

  async function doSignIn() {
    const fields = readFields();
    const err = validate(fields.email, fields.password);
    if (err) return setStatus(err, "err");
    if (!storageOk()) return setStatus("Safari blocked storage — turn off Private Browsing.", "err");

    signinBtn.disabled = true;
    setStatus("Signing in…", "work");
    try {
      const data = await apiPost("/api/v1/auth/login", { email: fields.email, password: fields.password });
      saveSession(data.access_token, data.email || fields.email);
      goHome();
    } catch (e) {
      const msg = String(e.message || e);
      if (/invalid email or password/i.test(msg)) {
        setStatus("Wrong email or password — use the same as on your Mac.", "err");
      } else if (/abort/i.test(msg)) {
        setStatus("Timed out — check your connection and try again.", "err");
      } else {
        setStatus(msg, "err");
      }
      signinBtn.disabled = false;
    }
  }

  async function doReset() {
    const fields = readFields();
    const err = validate(fields.email, fields.password);
    if (err) return setStatus(err, "err");
    if (fields.password !== fields.confirm) {
      return setStatus("Passwords do not match.", "err");
    }
    if (!storageOk()) return setStatus("Safari blocked storage — turn off Private Browsing.", "err");

    signinBtn.disabled = true;
    setStatus("Updating password…", "work");
    try {
      const data = await apiPost("/api/v1/auth/reset-password", {
        email: fields.email,
        new_password: fields.password,
      });
      saveSession(data.access_token, data.email || fields.email);
      goHome();
    } catch (e) {
      const msg = String(e.message || e);
      if (/no account/i.test(msg)) {
        setStatus("No account for this email — use Sign in to create one.", "err");
      } else if (/abort/i.test(msg)) {
        setStatus("Timed out — check your connection.", "err");
      } else {
        setStatus(msg, "err");
      }
      signinBtn.disabled = false;
    }
  }
})();
</script>
</body>
</html>
