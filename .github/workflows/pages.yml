name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p _site
          cp index.html sw.js manifest.webmanifest .nojekyll _site/
          cp -r js icons _site/
          echo "runnr.fyi" > _site/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Verify Pages deploy
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome != 'success'
        run: |
          echo "GitHub Pages deploy failed — re-run workflow from Actions tab."
          exit 1
