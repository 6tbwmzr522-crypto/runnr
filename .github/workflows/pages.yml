name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p _site
          cp index.html sw.js manifest.webmanifest .nojekyll _site/
          cp -r js icons _site/
          echo "runnr.fyi" > _site/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 25

      - uses: actions/upload-pages-artifact@v4
        if: steps.deployment.outcome == 'failure'
        with:
          path: _site

      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before final retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: sleep 25

      - uses: actions/upload-pages-artifact@v4
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        with:
          path: _site

      - id: deployment_retry2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Verify Pages deploy
        if: always()
        run: |
          if [ "${{ steps.deployment.outcome }}" = "success" ] \
            || [ "${{ steps.deployment_retry.outcome }}" = "success" ] \
            || [ "${{ steps.deployment_retry2.outcome }}" = "success" ]; then
            echo "GitHub Pages deploy succeeded."
            exit 0
          fi
          echo "GitHub Pages deploy failed after 3 attempts — use Actions → Re-run workflow."
          exit 1
